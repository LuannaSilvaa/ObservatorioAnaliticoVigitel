name: Executar atualização pendente agora

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ExecutarAtualizacaoPendenteAgora.yml"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  acionar:
    runs-on: ubuntu-latest
    steps:
      - name: Iniciar o processamento da base enviada
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "repos/$GITHUB_REPOSITORY/actions/workflows/AtualizacaoRemotaDaBase.yml/dispatches" \
            -f ref=main
          echo "Processamento solicitado novamente após corrigir a ordem entre metadados, sincronização e validação final."
