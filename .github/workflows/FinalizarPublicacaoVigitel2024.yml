name: Finalizar publicação do Vigitel 2024

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/FinalizarPublicacaoVigitel2024.yml"
  workflow_dispatch:

concurrency:
  group: atualizacao-remota-vigitel
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  actions: read

jobs:
  finalizar:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Baixar a versão publicada
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Confirmar 2024 e registrar sucesso
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          base_path = Path("BaseAnaliticaDoVigitel.js")
          texto = base_path.read_text(encoding="utf-8")
          marcador = "const DATA = "
          inicio = texto.index(marcador) + len(marcador)
          dados, _ = json.JSONDecoder().raw_decode(texto[inicio:])

          anos = [str(ano) for ano in dados["dims"]["years"]]
          if "2024" not in anos:
              raise SystemExit("A base presente na main ainda não contém 2024.")
          if dados.get("meta", {}).get("lastUpdateSourceFile") != "vigitel-2006-2024-peso-rake.csv":
              raise SystemExit("O arquivo publicado não corresponde ao envio administrativo validado.")

          agora = datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")
          estado = {
              "status": "success",
              "updatedAt": agora,
              "message": "Base recalculada, validada e publicada para todos os usuários.",
              "sourceFile": "vigitel-2006-2024-peso-rake.csv",
              "requestId": "358930099",
              "years": anos,
          }
          Path("EstadoDaAtualizacao.json").write_text(
              json.dumps(estado, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

          git config user.name "Observatório Vigitel - Administração remota"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add EstadoDaAtualizacao.json
          git commit -m "Confirma publicação da base Vigitel até 2024"
          git push origin HEAD:main

      - name: Encerrar o pedido administrativo e republicar o site
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_ID="358930099"
          TAG=$(gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" --jq '.tag_name' 2>/dev/null || true)
          gh api -X DELETE "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" >/dev/null 2>&1 || true
          if [ -n "$TAG" ]; then
            gh api -X DELETE "repos/$GITHUB_REPOSITORY/git/refs/tags/$TAG" >/dev/null 2>&1 || true
          fi
          gh api -X POST "repos/$GITHUB_REPOSITORY/pages/builds" >/dev/null
