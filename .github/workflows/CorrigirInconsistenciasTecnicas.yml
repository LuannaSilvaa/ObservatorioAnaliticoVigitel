name: Corrigir inconsistências técnicas

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/CorrigirInconsistenciasTecnicas.yml

permissions:
  contents: write
  pages: write

concurrency:
  group: corrigir-inconsistencias-tecnicas
  cancel-in-progress: false

jobs:
  corrigir:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Corrigir catálogo, automações e relatórios
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          from pathlib import Path
          import json

          raiz = Path('.')

          def ler_objeto_js(caminho: Path, prefixo: str):
              texto = caminho.read_text(encoding='utf-8')
              inicio = texto.index(prefixo) + len(prefixo)
              objeto, usado = json.JSONDecoder().raw_decode(texto[inicio:])
              return texto, inicio, usado, objeto

          # O catálogo atual passa a declarar como suportados somente os indicadores
          # que realmente possuem linhas na base publicada.
          _, _, _, base = ler_objeto_js(
              raiz / 'BaseAnaliticaDoVigitel.js',
              'const DATA = ',
          )
          indisponiveis = base.get('meta', {}).get('unsupportedIndicators', {})

          catalogo_path = raiz / 'CatalogoDeIdadeDetalhada.js'
          texto, inicio, usado, catalogo = ler_objeto_js(
              catalogo_path,
              'window.VIGITEL_AGE_DETAIL=',
          )
          meta = catalogo.setdefault('meta', {})
          meta['unsupportedIndicators'] = indisponiveis
          meta['supportedIndicators'] = [
              indicador
              for indicador in meta.get('supportedIndicators', [])
              if indicador not in indisponiveis
          ]
          codificado = json.dumps(catalogo, ensure_ascii=False, separators=(',', ':'))
          catalogo_path.write_text(
              texto[:inicio] + codificado + texto[inicio + usado:],
              encoding='utf-8',
          )

          # A verificação automática de novos envios deixa de rodar a cada cinco
          # minutos e passa a ocorrer uma vez por hora. O botão manual permanece.
          remoto_path = raiz / '.github/workflows/AtualizacaoRemotaDaBase.yml'
          remoto = remoto_path.read_text(encoding='utf-8')
          remoto = remoto.replace(
              '- cron: "*/5 * * * *"',
              '- cron: "17 * * * *"',
          )
          remoto_path.write_text(remoto, encoding='utf-8')

          # Futuras mudanças só serão aprovadas quando os relatórios gerados forem
          # também versionados, evitando novamente relatórios antigos na main.
          validacao_path = raiz / '.github/workflows/ValidarObservatorio.yml'
          validacao = validacao_path.read_text(encoding='utf-8')
          titulo = '      - name: Confirmar que os relatórios versionados estão atualizados\n'
          if titulo not in validacao:
              marcador = '      - name: Guardar relatórios de validação\n'
              bloco = (
                  titulo
                  + '        if: always()\n'
                  + '        run: |\n'
                  + '          git diff --exit-code -- \\\n'
                  + '            RelatorioDaValidacaoDaBase.txt \\\n'
                  + '            RelatorioDaAuditoriaDaIdadeDetalhada.txt \\\n'
                  + '            RelatorioDosIndicadoresEGraficos.txt \\\n'
                  + '            RelatorioDaPreservacaoDosArquivos.txt\n\n'
              )
              if marcador not in validacao:
                  raise RuntimeError('Não foi possível localizar o ponto de inserção no workflow de validação.')
              validacao = validacao.replace(marcador, bloco + marcador, 1)
          validacao_path.write_text(validacao, encoding='utf-8')
          PY

          python -m pip install --quiet pyyaml

          python - <<'PY'
          from pathlib import Path
          import yaml

          for caminho in Path('.github/workflows').glob('*.yml'):
              with caminho.open(encoding='utf-8') as arquivo:
                  documento = yaml.safe_load(arquivo)
              if not isinstance(documento, dict) or 'jobs' not in documento:
                  raise RuntimeError(f'Workflow inválido: {caminho}')
              print(f'Workflow válido: {caminho}')
          PY

          python ValidacaoDaBaseCompleta.py
          python AuditarIdadeDetalhada.py
          node TesteDosIndicadoresEGraficos.js
          python PreservarArquivosAntigos.py

          python - <<'PY'
          from pathlib import Path
          import csv
          import hashlib

          manifesto = Path('ManifestoDosArquivos.csv')
          with manifesto.open(encoding='utf-8-sig', newline='') as arquivo:
              nomes = [linha['Arquivo'] for linha in csv.DictReader(arquivo)]

          relatorio_auditoria = 'RelatorioDaAuditoriaDaIdadeDetalhada.txt'
          if relatorio_auditoria not in nomes:
              nomes.append(relatorio_auditoria)

          linhas = []
          for nome in sorted(set(nomes), key=str.casefold):
              caminho = Path(nome)
              if not caminho.is_file():
                  raise FileNotFoundError(f'Arquivo do manifesto não encontrado: {nome}')
              conteudo = caminho.read_bytes()
              linhas.append({
                  'Arquivo': nome,
                  'TamanhoEmBytes': str(len(conteudo)),
                  'CodigoSHA256': hashlib.sha256(conteudo).hexdigest(),
              })

          with manifesto.open('w', encoding='utf-8-sig', newline='') as arquivo:
              escritor = csv.DictWriter(
                  arquivo,
                  fieldnames=['Arquivo', 'TamanhoEmBytes', 'CodigoSHA256'],
              )
              escritor.writeheader()
              escritor.writerows(linhas)
          PY

          grep -F 'Combinações totais renderizadas: 1430' RelatorioDosIndicadoresEGraficos.txt
          grep -F 'Indicadores disponíveis com idade detalhada: 55' RelatorioDaValidacaoDaBase.txt
          grep -F 'Combinações divergentes: 0' RelatorioDaAuditoriaDaIdadeDetalhada.txt
          grep -F 'Erros: 0' RelatorioDaPreservacaoDosArquivos.txt

      - name: Gravar correções na main
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "Observatório Vigitel - Correção técnica"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rm -f .github/workflows/CorrigirInconsistenciasTecnicas.yml
          git add -A

          if git diff --cached --quiet; then
            echo "Nenhuma correção adicional foi necessária."
            exit 0
          fi

          git commit -m "Corrige relatórios, catálogo e frequência da atualização"
          git pull --rebase origin main
          git push origin HEAD:main
          gh api -X POST "repos/$GITHUB_REPOSITORY/pages/builds" >/dev/null 2>&1 || true
