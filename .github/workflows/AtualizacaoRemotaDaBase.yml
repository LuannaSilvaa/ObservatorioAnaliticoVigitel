name: Atualização remota da base do Vigitel

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: atualizacao-remota-vigitel
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  actions: read

jobs:
  atualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Localizar e baixar envio administrativo
        id: pedido
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENTO: ${{ github.event_name }}
        shell: bash
        run: |
          set -euo pipefail
          gh api "repos/$GITHUB_REPOSITORY/releases?per_page=100" > /tmp/releases.json
          jq --arg evento "$EVENTO" '[.[]
            | select(.draft == true)
            | select(.author.login == "LuannaSilvaa")
            | select(.tag_name | startswith("atualizacao-vigitel-"))
            | select(($evento == "workflow_dispatch") or (((.body // "") | contains("vigitel-status:erro")) | not))
          ] | sort_by(.created_at) | reverse | .[0] // empty' /tmp/releases.json > /tmp/pedido.json

          if [ ! -s /tmp/pedido.json ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BASES=$(jq '[.assets[]
            | select(.name | test("\\.(csv|xls|xlsm)$"; "i"))
            | select((.name | ascii_downcase | test("dicion[aá]rio|dictionary")) | not)
          ] | length' /tmp/pedido.json)
          DICIONARIOS=$(jq '[.assets[]
            | select(.name | test("\\.(csv|xls|xlsx|xlsm)$"; "i"))
            | select(.name | ascii_downcase | test("dicion[aá]rio|dictionary"))
          ] | length' /tmp/pedido.json)
          ID=$(jq -r .id /tmp/pedido.json)

          if [ "$BASES" -ne 1 ] || [ "$DICIONARIOS" -gt 1 ]; then
            NOME=$(jq -r '.name // "Atualização do Vigitel"' /tmp/pedido.json)
            CORPO=$(jq -r '.body // ""' /tmp/pedido.json | sed '/<!-- vigitel-status:erro -->/,$d')
            MENSAGEM=$(printf '%s\n\n%s\n%s\n' "$CORPO" '<!-- vigitel-status:erro -->' 'Anexe exatamente uma base CSV, XLS ou XLSM e, opcionalmente, um dicionário CSV, XLS, XLSX ou XLSM.')
            gh api -X PATCH "repos/$GITHUB_REPOSITORY/releases/$ID" -f name="[ERRO] $NOME" -f body="$MENSAGEM"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LIMITE_BYTES=2147483648
          BASE_TAMANHO=$(jq -r '.assets[]
            | select(.name | test("\\.(csv|xls|xlsm)$"; "i"))
            | select((.name | ascii_downcase | test("dicion[aá]rio|dictionary")) | not)
            | .size' /tmp/pedido.json)
          DIC_TAMANHO=$(jq -r '[.assets[]
            | select(.name | test("\\.(csv|xls|xlsx|xlsm)$"; "i"))
            | select(.name | ascii_downcase | test("dicion[aá]rio|dictionary"))
          ][0].size // 0' /tmp/pedido.json)

          if [ "$BASE_TAMANHO" -ge "$LIMITE_BYTES" ] || [ "$DIC_TAMANHO" -ge "$LIMITE_BYTES" ]; then
            NOME=$(jq -r '.name // "Atualização do Vigitel"' /tmp/pedido.json)
            CORPO=$(jq -r '.body // ""' /tmp/pedido.json | sed '/<!-- vigitel-status:erro -->/,$d')
            MENSAGEM=$(printf '%s\n\n%s\n%s\n' "$CORPO" '<!-- vigitel-status:erro -->' 'Cada arquivo deve ter menos de 2 GiB. Para bases próximas do limite, use CSV.')
            gh api -X PATCH "repos/$GITHUB_REPOSITORY/releases/$ID" -f name="[ERRO] $NOME" -f body="$MENSAGEM"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mkdir -p /tmp/vigitel
          BASE_URL=$(jq -r '.assets[]
            | select(.name | test("\\.(csv|xls|xlsm)$"; "i"))
            | select((.name | ascii_downcase | test("dicion[aá]rio|dictionary")) | not)
            | .url' /tmp/pedido.json)
          BASE_NOME=$(jq -r '.assets[]
            | select(.name | test("\\.(csv|xls|xlsm)$"; "i"))
            | select((.name | ascii_downcase | test("dicion[aá]rio|dictionary")) | not)
            | .name' /tmp/pedido.json)
          gh api -H "Accept: application/octet-stream" "$BASE_URL" > "/tmp/vigitel/$BASE_NOME"

          DIC_URL=$(jq -r '[.assets[]
            | select(.name | test("\\.(csv|xls|xlsx|xlsm)$"; "i"))
            | select(.name | ascii_downcase | test("dicion[aá]rio|dictionary"))
          ][0].url // ""' /tmp/pedido.json)
          DIC_NOME=$(jq -r '[.assets[]
            | select(.name | test("\\.(csv|xls|xlsx|xlsm)$"; "i"))
            | select(.name | ascii_downcase | test("dicion[aá]rio|dictionary"))
          ][0].name // ""' /tmp/pedido.json)
          if [ -n "$DIC_URL" ]; then
            gh api -H "Accept: application/octet-stream" "$DIC_URL" > "/tmp/vigitel/$DIC_NOME"
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "release_id=$ID" >> "$GITHUB_OUTPUT"
          echo "tag=$(jq -r .tag_name /tmp/pedido.json)" >> "$GITHUB_OUTPUT"
          echo "base=/tmp/vigitel/$BASE_NOME" >> "$GITHUB_OUTPUT"
          echo "base_name=$BASE_NOME" >> "$GITHUB_OUTPUT"
          if [ -n "$DIC_NOME" ]; then
            echo "dictionary=/tmp/vigitel/$DIC_NOME" >> "$GITHUB_OUTPUT"
          else
            echo "dictionary=" >> "$GITHUB_OUTPUT"
          fi

      - name: Baixar o repositório
        if: steps.pedido.outputs.found == 'true'
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Preparar Python
        if: steps.pedido.outputs.found == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar bibliotecas
        if: steps.pedido.outputs.found == 'true'
        run: python -m pip install --upgrade pip pandas numpy openpyxl xlrd

      - name: Processar, validar e publicar para todos
        if: steps.pedido.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_FILE: ${{ steps.pedido.outputs.base }}
          BASE_NAME: ${{ steps.pedido.outputs.base_name }}
          DICTIONARY_FILE: ${{ steps.pedido.outputs.dictionary }}
          RELEASE_ID: ${{ steps.pedido.outputs.release_id }}
          RELEASE_TAG: ${{ steps.pedido.outputs.tag }}
        shell: bash
        run: |
          set -u
          git config user.name "Observatório Vigitel - Administração remota"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          LOG="RelatorioDaUltimaAtualizacaoRemota.txt"
          : > "$LOG"
          printf 'ATUALIZAÇÃO REMOTA DO OBSERVATÓRIO VIGITEL\nArquivo: %s\nInício: %s\n\n' "$BASE_NAME" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$LOG"

          escrever_estado() {
            STATUS="$1" MENSAGEM="$2" python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          estado = {
              "status": os.environ["STATUS"],
              "updatedAt": datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z"),
              "message": os.environ["MENSAGEM"],
              "sourceFile": os.environ["BASE_NAME"],
              "requestId": os.environ["RELEASE_ID"],
          }
          open("EstadoDaAtualizacao.json", "w", encoding="utf-8").write(json.dumps(estado, ensure_ascii=False, indent=2) + "\n")
          PY
          }

          publicar_estado() {
            git add EstadoDaAtualizacao.json "$LOG" 2>/dev/null || true
            git commit -m "$1" >/dev/null 2>&1 || true
            git push origin HEAD:main >> "$LOG" 2>&1 || true
          }

          falhar() {
            CODIGO="$1"
            MOTIVO="$2"
            printf '\nFALHA: %s\n' "$MOTIVO" >> "$LOG"
            cp "$LOG" /tmp/RelatorioDaUltimaAtualizacaoRemota.txt
            git fetch origin main >/dev/null 2>&1 || true
            git reset --hard origin/main >/dev/null 2>&1 || true
            git clean -fd >/dev/null 2>&1 || true
            cp /tmp/RelatorioDaUltimaAtualizacaoRemota.txt "$LOG"
            DETALHE=$(tail -n 20 "$LOG" | tr '\n' ' ' | cut -c1-900)
            escrever_estado "error" "A atualização foi recusada: $DETALHE. A base pública anterior foi preservada."
            git add EstadoDaAtualizacao.json "$LOG"
            git commit -m "Registra detalhes da falha na atualização remota do Vigitel" >/dev/null 2>&1 || true
            git pull --rebase origin main >> "$LOG" 2>&1 || true
            git push origin HEAD:main >> "$LOG" 2>&1 || true
            gh api -X POST "repos/$GITHUB_REPOSITORY/pages/builds" >/dev/null 2>&1 || true
            NOME=$(jq -r '.name // "Atualização do Vigitel"' /tmp/pedido.json | sed 's/^\[ERRO\] //')
            CORPO=$(jq -r '.body // ""' /tmp/pedido.json | sed '/<!-- vigitel-status:erro -->/,$d')
            MENSAGEM=$(printf '%s\n\n%s\n%s\n%s\n' "$CORPO" '<!-- vigitel-status:erro -->' 'A base foi recusada e a versão pública anterior foi mantida.' "$DETALHE")
            gh api -X PATCH "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" -f name="[ERRO] $NOME" -f body="$MENSAGEM" >/dev/null 2>&1 || true
            exit "$CODIGO"
          }

          executar() {
            TITULO="$1"
            shift
            printf '\n===== %s =====\n' "$TITULO" | tee -a "$LOG"
            "$@" 2>&1 | tee -a "$LOG"
            return ${PIPESTATUS[0]}
          }

          escrever_estado "processing" "A base foi recebida e está sendo preparada para recálculo."
          publicar_estado "Registra início da atualização remota do Vigitel"

          executar "Preparação e recálculo" python ProcessarAtualizacaoRemotaOtimizado.py --base "$BASE_FILE" --source-name "$BASE_NAME" || falhar $? "Falha na preparação ou no recálculo."
          executar "Validação da base completa" python ValidacaoDaBaseCompleta.py || falhar $? "Falha na validação da base completa."
          executar "Teste dos indicadores e gráficos" node TesteDosIndicadoresEGraficos.js || falhar $? "Falha no teste dos indicadores e gráficos."
          executar "Validação e publicação atômica" python ValidacaoDaPublicacaoNoGitHub.py || falhar $? "Falha na validação ou na publicação atômica."

          echo "Atualização concluída e promovida para a branch main."
