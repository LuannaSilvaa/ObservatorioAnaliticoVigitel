name: Diagnosticar codificações da base enviada

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/DiagnosticarCodificacoesDaBase.yml"
      - "DiagnosticarCodificacoesDaBaseRemota.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnosticar:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Localizar e baixar a base do rascunho
        id: base
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh api "repos/$GITHUB_REPOSITORY/releases?per_page=100" > /tmp/releases.json
          jq '[.[]
            | select(.draft == true)
            | select(.author.login == "LuannaSilvaa")
          ] | sort_by(.created_at) | reverse | .[0] // empty' /tmp/releases.json > /tmp/pedido.json

          if [ ! -s /tmp/pedido.json ]; then
            echo "Nenhum rascunho administrativo foi localizado."
            exit 1
          fi

          URL=$(jq -r '.assets[]
            | select(.name | test("\\.(csv)$"; "i"))
            | select((.name | ascii_downcase | test("dicion[aá]rio|dictionary")) | not)
            | .url' /tmp/pedido.json | head -n 1)
          NOME=$(jq -r '.assets[]
            | select(.name | test("\\.(csv)$"; "i"))
            | select((.name | ascii_downcase | test("dicion[aá]rio|dictionary")) | not)
            | .name' /tmp/pedido.json | head -n 1)

          test -n "$URL"
          mkdir -p /tmp/vigitel
          gh api -H "Accept: application/octet-stream" "$URL" > "/tmp/vigitel/$NOME"
          echo "path=/tmp/vigitel/$NOME" >> "$GITHUB_OUTPUT"
          echo "name=$NOME" >> "$GITHUB_OUTPUT"

      - name: Baixar o repositório
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar bibliotecas
        run: python -m pip install --upgrade pip pandas openpyxl

      - name: Examinar codificações reais
        run: |
          set -euo pipefail
          python DiagnosticarCodificacoesDaBaseRemota.py \
            --base "${{ steps.base.outputs.path }}" \
            --saida DiagnosticoDasCodificacoesDaBase.txt

      - name: Publicar diagnóstico
        run: |
          set -euo pipefail
          git config user.name "Observatório Vigitel - Diagnóstico de codificações"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f DiagnosticoDasCodificacoesDaBase.txt
          git commit -m "Registra codificações reais da base enviada" || exit 0
          git pull --rebase origin main
          git push origin HEAD:main
