name: Sincronizar arquivos derivados do Observatório

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/SincronizarArquivosDerivados.yml"
  workflow_dispatch:

concurrency:
  group: sincronizacao-arquivos-derivados-vigitel
  cancel-in-progress: false

permissions:
  contents: write
  pages: write

jobs:
  sincronizar:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Baixar a versão pública atual
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sincronizar todos os arquivos derivados
        run: python SincronizarArquivosDoObservatorio.py

      - name: Validar estrutura e metodologia
        run: python ValidacaoDaBaseCompleta.py

      - name: Testar indicadores e gráficos
        run: node TesteDosIndicadoresEGraficos.js

      - name: Validar, promover e publicar atomicamente
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python ValidacaoDaPublicacaoNoGitHub.py

      - name: Confirmar a versão pública promovida
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          LOCAL_SHA=$(git rev-parse HEAD)
          REMOTE_SHA=$(gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/main" --jq '.object.sha')

          if [ "$LOCAL_SHA" != "$REMOTE_SHA" ]; then
            echo "A main aponta para $REMOTE_SHA, mas o conjunto validado é $LOCAL_SHA."
            exit 1
          fi

          gh api \
            -H "Accept: application/vnd.github.raw+json" \
            "repos/$GITHUB_REPOSITORY/contents/EstadoDaAtualizacao.json?ref=main" \
            > /tmp/estado-da-atualizacao.json

          python - <<'PY'
          import json
          from pathlib import Path

          estado = json.loads(Path("/tmp/estado-da-atualizacao.json").read_text(encoding="utf-8"))
          if estado.get("status") != "success":
              raise SystemExit("O estado público não está marcado como success.")
          anos = [str(ano) for ano in estado.get("years", [])]
          if "2024" not in anos:
              raise SystemExit("O ano de 2024 não consta no estado público.")
          if estado.get("sourceFile") != "vigitel-2006-2024-peso-rake.csv":
              raise SystemExit("O estado público não corresponde ao arquivo validado.")
          print("Publicação confirmada na main com estado success e ano de 2024.")
          PY

# A publicação, a atualização do estado, a remoção do rascunho e o Pages são
# concluídos por PrepararPublicacaoEmPartes.py após todas as validações passarem.
