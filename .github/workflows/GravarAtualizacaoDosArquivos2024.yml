name: Gravar atualização funcional dos arquivos de 2024

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  gravar:
    if: github.actor != 'github-actions[bot]' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Baixar a branch de atualização
        uses: actions/checkout@v4
        with:
          ref: agent/atualiza-arquivos-2024
          fetch-depth: 0

      - name: Gerar e validar os arquivos atualizados
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap

          workflow_path = Path('.github/workflows/AplicarAtualizacaoDosArquivos2024.yml')
          workflow = workflow_path.read_text(encoding='utf-8')
          marcador_inicio = "          python - <<'PY'\n"
          inicio = workflow.index(marcador_inicio) + len(marcador_inicio)
          fim = workflow.index("\n          PY", inicio)
          codigo = textwrap.dedent(workflow[inicio:fim])
          exec(compile(codigo, 'AtualizacaoDosArquivos2024.py', 'exec'), {})

          validador_path = Path('PreservarArquivosAntigos.py')
          validador = validador_path.read_text(encoding='utf-8')
          quebrado = '''    REPORT_PATH.write_text("
          ".join(lines) + "
          ", encoding="utf-8")
              print("
          ".join(lines))'''
          correto = r'''    REPORT_PATH.write_text("\n".join(lines) + "\n", encoding="utf-8")
              print("\n".join(lines))'''
          if quebrado not in validador:
              raise RuntimeError('Não foi possível localizar o trecho de quebra de linha do validador.')
          validador_path.write_text(validador.replace(quebrado, correto, 1), encoding='utf-8')
          PY

          git restore .github/workflows/ValidarObservatorio.yml
          python -m py_compile PreservarArquivosAntigos.py ValidacaoDaPublicacaoNoGitHub.py
          python PreservarArquivosAntigos.py
          node --check InicializacaoDoObservatorio.js
          node --check AdministracaoIntegradaAoIndex.js
          node --check SistemaAnaliticoDoVigitel.js

      - name: Gravar somente os arquivos funcionais
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html README.md PreservarArquivosAntigos.py ValidacaoDaPublicacaoNoGitHub.py RelatorioDaPreservacaoDosArquivos.txt
          git commit -m "Atualiza arquivos antigos para a base de 2024"
          git push origin HEAD:agent/atualiza-arquivos-2024
