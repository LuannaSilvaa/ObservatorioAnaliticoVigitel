name: DiagnĂ³stico da atualizaĂ§Ă£o remota

on:
  workflow_run:
    workflows:
      - AtualizaĂ§Ă£o remota da base do Vigitel
    types:
      - completed
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/DiagnosticoDaAtualizacaoRemota.yml"

permissions:
  actions: read
  contents: write
  pages: write

concurrency:
  group: diagnostico-atualizacao-remota-vigitel
  cancel-in-progress: false

jobs:
  diagnosticar:
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion != 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o repositĂ³rio
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Registrar motivo da falha inesperada
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENTO: ${{ github.event_name }}
          RUN_EVENT_ID: ${{ github.event.workflow_run.id }}
        shell: bash
        run: |
          set -u

          STATUS=$(python - <<'PY'
          import json
          try:
              print(json.load(open('EstadoDaAtualizacao.json', encoding='utf-8')).get('status', 'idle'))
          except Exception:
              print('idle')
          PY
          )

          if [ "$STATUS" != "processing" ] && [ "$EVENTO" = "workflow_run" ]; then
            echo "A falha jĂ¡ foi registrada pelo fluxo principal."
            exit 0
          fi

          RUN_ID="${RUN_EVENT_ID:-}"
          if [ -z "$RUN_ID" ]; then
            RUN_ID=$(gh api "repos/$GITHUB_REPOSITORY/actions/workflows/AtualizacaoRemotaDaBase.yml/runs?status=failure&per_page=1" --jq '.workflow_runs[0].id // empty')
          fi

          TEMP=$(mktemp)
          if [ -n "$RUN_ID" ]; then
            gh run view "$RUN_ID" --repo "$GITHUB_REPOSITORY" --log-failed > "$TEMP" 2>&1 || true
          fi

          {
            echo "DIAGNĂ“STICO DA ATUALIZAĂ‡ĂƒO REMOTA DO VIGITEL"
            echo "ExecuĂ§Ă£o: ${RUN_ID:-nĂ£o identificada}"
            echo "Registrado em: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            if [ -s "$TEMP" ]; then
              tail -n 800 "$TEMP"
            else
              echo "O GitHub nĂ£o devolveu logs detalhados. O processo pode ter sido encerrado por limite de memĂ³ria ou armazenamento."
            fi
          } > RelatorioDaUltimaAtualizacaoRemota.txt

          DETALHE=$(grep -Eai 'error|erro|killed|memory|memĂ³ria|exception|traceback|failed|failure|fatal' RelatorioDaUltimaAtualizacaoRemota.txt | tail -n 3 | tr '\n' ' ' | cut -c1-700)
          if [ -z "$DETALHE" ]; then
            DETALHE="O processo foi encerrado inesperadamente antes de concluir a atualizaĂ§Ă£o."
          fi

          MENSAGEM="A atualizaĂ§Ă£o falhou: $DETALHE A base pĂºblica anterior foi preservada."
          MENSAGEM="$MENSAGEM" python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path

          caminho = Path('EstadoDaAtualizacao.json')
          try:
              estado = json.loads(caminho.read_text(encoding='utf-8'))
          except Exception:
              estado = {}
          estado.update({
              'status': 'error',
              'updatedAt': datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace('+00:00', 'Z'),
              'message': os.environ['MENSAGEM'],
          })
          caminho.write_text(json.dumps(estado, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY

          git config user.name "ObservatĂ³rio Vigitel - DiagnĂ³stico automĂ¡tico"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add EstadoDaAtualizacao.json
          git add -f RelatorioDaUltimaAtualizacaoRemota.txt
          git commit -m "Registra diagnĂ³stico da falha na atualizaĂ§Ă£o remota" || exit 0
          git pull --rebase origin main || true
          git push origin HEAD:main
          gh api -X POST "repos/$GITHUB_REPOSITORY/pages/builds" >/dev/null 2>&1 || true
